<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sandbag Sales{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    nav {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 52px;
    }
    nav .brand {
      font-weight: 700;
      font-size: 1rem;
      color: #a78bfa;
      letter-spacing: 0.02em;
      margin-right: auto;
    }
    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover, nav a.active {
      color: #e2e8f0;
      border-bottom-color: #a78bfa;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    .flash {
      background: #3b1f1f;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <span class="brand">Sandbag Sales</span>
    <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('log_sale') }}" {% if request.endpoint == 'log_sale' %}class="active"{% endif %}>Log Sale</a>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
