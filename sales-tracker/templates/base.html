<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='30%25' stop-color='%23f97316'/><stop offset='100%25' stop-color='%23facc15'/></linearGradient></defs><rect width='32' height='32' rx='6' fill='%231e2130'/><text x='16' y='23' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='22' fill='url(%23g)'>S</text></svg>" />
  <title>{% block title %}Sandbag Sales{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    nav {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 52px;
    }
    nav .brand {
      font-weight: 700;
      font-size: 1rem;
      color: #a78bfa;
      letter-spacing: 0.02em;
      margin-right: auto;
    }
    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover, nav a.active {
      color: #e2e8f0;
      border-bottom-color: #a78bfa;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
    }

    .flash {
      background: #3b1f1f;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <span class="brand">Sandbag Sales</span>
    <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
    <a href="{{ url_for('log_sale') }}" {% if request.endpoint == 'log_sale' %}class="active"{% endif %}>Log Sale</a>
    <a href="{{ url_for('milestones') }}" {% if request.endpoint == 'milestones' %}class="active"{% endif %}>Milestones</a>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
